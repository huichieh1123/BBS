# ==========================================
# 模擬控制參數 (Simulation Control)
# ==========================================
simulation:
  mode: "db"                  # 模式切換: "db" 或 "random"
  target_run_id: "20260203174258"

# ==========================================
# 場域實體配置 (Yard Configuration)
# ==========================================
yard:
  max_row: 6
  max_bay: 11
  max_level: 8
  workstation_count: 2
  port_count: 5

# ==========================================
# Random 模式專用參數 (Random Mode Specific)
# ==========================================
random:
  total_boxes: 400            # 要隨機生成的貨櫃總數
  mission_count: 50           # 要隨機生成的任務總數

# ==========================================
# 時間參數設定 (Time Metrics)
# ==========================================
time:
  t_travel: 5.0
  t_handle: 30.0
  t_port_handle: 10.0
  t_unit_process: 2.0

# ==========================================
# 演算法求解器參數 (Solver Configuration)
# ==========================================
solver:
  agv_count: 3                # AGV 數量
  beam_width: 100             # Beam Search 寬度

# ==========================================
# 存log的路徑 (Logging path)
# ==========================================
logging:
  output_dir: "logs"